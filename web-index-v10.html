<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国交通地图 - 八纵八横高铁网</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; background: #f5f5f5; }
        #map { width: 100vw; height: 100vh; }
        
        /* 控制面板 - 简洁专业 */
        .control-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); border-radius: 8px;
            padding: 16px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            max-width: 300px; max-height: 90vh; overflow-y: auto;
            border: 1px solid #e0e0e0;
        }
        .control-panel h2 { 
            color: #1a1a1a; margin-bottom: 12px; font-size: 16px; 
            border-bottom: 2px solid #1E3A8A; padding-bottom: 8px; 
            font-weight: 600;
        }
        .control-panel h3 { 
            color: #333; margin: 12px 0 8px 0; font-size: 13px; 
            font-weight: 600;
        }
        
        /* 筛选按钮 - 专业配色 */
        .filter-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .filter-btn {
            padding: 6px 12px; border: 1px solid #d0d0d0; border-radius: 4px; 
            cursor: pointer; font-size: 12px; transition: all 0.2s ease; 
            font-weight: 500; background: #ffffff; color: #333;
        }
        .filter-btn.all { background: #1E3A8A; color: white; border-color: #1E3A8A; }
        .filter-btn.vertical { background: #C41E3A; color: white; border-color: #C41E3A; }
        .filter-btn.horizontal { background: #1E3A8A; color: white; border-color: #1E3A8A; }
        .filter-btn.xinjiang { background: #8B0000; color: white; border-color: #8B0000; }
        .filter-btn.chuanyu { background: #C41E3A; color: white; border-color: #C41E3A; }
        .filter-btn:hover { background: #f0f0f0; }
        .filter-btn.all:hover, .filter-btn.vertical:hover, 
        .filter-btn.horizontal:hover, .filter-btn.xinjiang:hover, .filter-btn.chuanyu:hover {
            opacity: 0.9;
        }
        .filter-btn.active { 
            transform: none; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2); 
            opacity: 1 !important;
        }
        
        /* 复选框组 */
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .checkbox-item {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            padding: 6px 10px; border-radius: 4px; transition: all 0.2s ease;
            background: #f8f8f8; border: 1px solid #e0e0e0;
        }
        .checkbox-item:hover { background: #f0f0f0; }
        .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .checkbox-item label { cursor: pointer; font-size: 13px; color: #333; margin: 0; }
        .checkbox-item.railway { border-left: 3px solid #C41E3A; }
        .checkbox-item.highway { border-left: 3px solid #1E3A8A; }
        
        /* 状态筛选 */
        .status-filter { display: flex; flex-wrap: wrap; gap: 6px; }
        .status-btn {
            padding: 5px 10px; border: 1px solid #d0d0d0; border-radius: 4px;
            background: white; cursor: pointer; font-size: 11px; 
            transition: all 0.2s ease; color: #555;
        }
        .status-btn.completed { border-color: #2E7D32; color: #2E7D32; }
        .status-btn.constructing { border-color: #F59E0B; color: #F59E0B; }
        .status-btn.planning { border-color: #6B7280; color: #6B7280; }
        .status-btn.active { 
            font-weight: 600; 
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }
        .status-btn.completed.active { background: #2E7D32; color: white; }
        .status-btn.constructing.active { background: #F59E0B; color: white; }
        .status-btn.planning.active { background: #6B7280; color: white; }
        
        /* 图例面板 - 专业标准 */
        .legend-panel {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); border-radius: 8px;
            padding: 14px 18px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            max-width: 280px; border: 1px solid #e0e0e0;
        }
        .legend-panel h4 { 
            margin-bottom: 10px; color: #1a1a1a; font-size: 14px; 
            border-bottom: 2px solid #1E3A8A; padding-bottom: 6px; 
            font-weight: 600;
        }
        .legend-item { 
            display: flex; align-items: center; margin-bottom: 6px; 
            font-size: 12px; color: #333;
        }
        .legend-line { 
            width: 35px; height: 3px; margin-right: 10px; 
            border-radius: 1px; flex-shrink: 0;
        }
        .legend-section { 
            margin-top: 10px; padding-top: 10px; 
            border-top: 1px solid #e0e0e0;
        }
        .legend-section h5 { 
            color: #666; font-size: 11px; margin-bottom: 6px; 
            font-weight: 600;
        }
        
        /* 统计面板 */
        .stats-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); border-radius: 8px;
            padding: 14px 20px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            border: 1px solid #e0e0e0;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-value { font-size: 22px; font-weight: 700; color: #1E3A8A; }
        .stat-label { font-size: 11px; color: #666; margin-top: 2px; }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f5f5f5; display: flex; justify-content: center; 
            align-items: center; z-index: 9999;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 3px solid #e0e0e0;
            border-top-color: #1E3A8A; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 弹窗样式 - 简洁专业 */
        .leaflet-popup-content-wrapper {
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }
        .leaflet-popup-content {
            margin: 12px;
            font-size: 13px;
            line-height: 1.5;
        }
        .leaflet-popup-content h3 {
            color: #1a1a1a;
            font-size: 15px;
            margin-bottom: 8px;
            font-weight: 600;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 6px;
        }
        .leaflet-popup-content p {
            margin: 4px 0;
            color: #333;
        }
        .leaflet-popup-content strong {
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    <div id="map"></div>
    
    <div class="control-panel">
        <h2>🚄 十五五交通地图</h2>
        
        <h3>线路筛选</h3>
        <div class="filter-group">
            <button class="filter-btn all active" onclick="filterRoutes('all')">全部</button>
            <button class="filter-btn vertical" onclick="filterRoutes('vertical')">八纵</button>
            <button class="filter-btn horizontal" onclick="filterRoutes('horizontal')">八横</button>
            <button class="filter-btn xinjiang" onclick="filterRoutes('xinjiang')">新疆</button>
            <button class="filter-btn chuanyu" onclick="filterRoutes('chuanyu')">川渝</button>
        </div>
        
        <h3>显示控制</h3>
        <div class="checkbox-group">
            <div class="checkbox-item railway">
                <input type="checkbox" id="showRailway" checked onchange="toggleTransportType()">
                <label for="showRailway">🚆 铁路</label>
            </div>
            <div class="checkbox-item highway">
                <input type="checkbox" id="showHighway" checked onchange="toggleTransportType()">
                <label for="showHighway">🛣️ 高速公路</label>
            </div>
        </div>
        
        <h3>建设状态</h3>
        <div class="status-filter">
            <button class="status-btn completed active" onclick="toggleStatus('completed')">已建成</button>
            <button class="status-btn constructing active" onclick="toggleStatus('constructing')">在建</button>
            <button class="status-btn planning active" onclick="toggleStatus('planning')">规划</button>
        </div>
    </div>
    
    <div class="stats-panel">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="routeCount">0</div>
                <div class="stat-label">线路数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="cityCount">300+</div>
                <div class="stat-label">城市</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">已建成</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalMileage">0</div>
                <div class="stat-label">总里程 (km)</div>
            </div>
        </div>
    </div>
    
    <div class="legend-panel">
        <h4>📖 图例说明</h4>
        
        <!-- 线路类型 -->
        <div class="legend-item">
            <svg width="35" height="20" style="margin-right:10px;">
                <line x1="0" y1="10" x2="35" y2="10" stroke="#8B0000" stroke-width="2"/>
                <line x1="0" y1="15" x2="35" y2="15" stroke="#8B0000" stroke-width="2"/>
            </svg>
            <span>高速铁路（双线）</span>
        </div>
        <div class="legend-item">
            <div class="legend-line" style="background:#8B0000;height:2px;"></div>
            <span>普通铁路</span>
        </div>
        <div class="legend-item">
            <div class="legend-line" style="background:#1E3A8A;height:2px;"></div>
            <span>高速公路</span>
        </div>
        
        <!-- 建设状态 -->
        <div class="legend-section">
            <h5>建设状态</h5>
            <div class="legend-item">
                <div class="legend-line" style="background:#333;height:2px;opacity:0.95;"></div>
                <span>已建成（实线）</span>
            </div>
            <div class="legend-item">
                <svg width="35" height="10" style="margin-right:10px;">
                    <line x1="0" y1="5" x2="15" y2="5" stroke="#F59E0B" stroke-width="2" stroke-dasharray="15,10"/>
                    <line x1="18" y1="5" x2="33" y2="5" stroke="#F59E0B" stroke-width="2" stroke-dasharray="15,10"/>
                </svg>
                <span>在建（虚线）</span>
            </div>
            <div class="legend-item">
                <svg width="35" height="10" style="margin-right:10px;">
                    <line x1="0" y1="5" x2="35" y2="5" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,5"/>
                </svg>
                <span>规划（点线）</span>
            </div>
        </div>
        
        <!-- 线宽说明 -->
        <div class="legend-section">
            <h5>线宽标准（px）</h5>
            <div class="legend-item">
                <div class="legend-line" style="background:#1a1a1a;height:2.5px;opacity:0.95;"></div>
                <span>高铁已建成 2.5</span>
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background:#1a1a1a;height:2px;opacity:0.95;"></div>
                <span>普铁/高速已建成 2.0</span>
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background:#1a1a1a;height:1.5px;opacity:0.95;"></div>
                <span>普铁/高速在建 1.5</span>
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background:#1a1a1a;height:1px;opacity:0.7;"></div>
                <span>规划线路 1.0</span>
            </div>
        </div>
    </div>

        {id:"H1",name:"京港澳高速",code:"G4",start:"北京",end:"港澳",status:"completed",year:"2015",mileage:2285,lanes:"4-8",significance:"南北大动脉",cities:["北京","石家庄","郑州","武汉","长沙","广州","深圳","港澳"],isHighway:true,grade:"national"},
        {id:"H2",name:"连霍高速",code:"G30",start:"连云港",end:"霍尔果斯",status:"completed",year:"2017",mileage:4244,lanes:"4-6",significance:"东西向大通道",cities:["连云港","徐州","郑州","西安","兰州","乌鲁木齐","霍尔果斯"],isHighway:true,grade:"national"},
        {id:"H3",name:"沪蓉高速",code:"G42",start:"上海",end:"成都",status:"completed",year:"2014",mileage:1960,lanes:"4-6",significance:"沿江通道",cities:["上海","南京","合肥","武汉","重庆","成都"],isHighway:true,grade:"national"},
        {id:"H4",name:"京新高速",code:"G7",start:"北京",end:"乌鲁木齐",status:"completed",year:"2021",mileage:2540,lanes:"4-6",significance:"进出疆大通道",cities:["北京","呼和浩特","银川","哈密","乌鲁木齐"],isHighway:true,grade:"national"},
        {id:"H5",name:"兰海高速",code:"G75",start:"兰州",end:"海口",status:"constructing",startYear:"2020",endYear:"2027",mileage:2570,lanes:"4-6",significance:"西部陆海新通道",cities:["兰州","重庆","贵阳","南宁","海口"],isHighway:true,grade:"national"},
        {id:"H6",name:"沪昆高速",code:"G60",start:"上海",end:"昆明",status:"completed",year:"2015",mileage:2730,lanes:"4-6",significance:"连接华东西南",cities:["上海","杭州","南昌","长沙","贵阳","昆明"],isHighway:true,grade:"national"},
        {id:"H7",name:"京沪高速",code:"G2",start:"北京",end:"上海",status:"completed",year:"2010",mileage:1260,lanes:"4-8",significance:"连接京津冀长三角",cities:["北京","天津","济南","南京","上海"],isHighway:true,grade:"national"},
        {id:"H8",name:"京昆高速",code:"G5",start:"北京",end:"昆明",status:"completed",year:"2015",mileage:2865,lanes:"4-6",significance:"连接华北西南",cities:["北京","石家庄","西安","成都","昆明"],isHighway:true,grade:"national"},
        {id:"H9",name:"乌尉高速",code:"S21",start:"乌鲁木齐",end:"尉犁",status:"constructing",startYear:"2020",endYear:"2026",mileage:325,lanes:"4",significance:"南北疆通道",cities:["乌鲁木齐","尉犁"],isHighway:true,grade:"regional"},
        {id:"H10",name:"渝遂高速",code:"G93",start:"重庆",end:"遂宁",status:"constructing",startYear:"2023",endYear:"2026",mileage:180,lanes:"4-6",significance:"成渝通道",cities:["重庆","遂宁"],isHighway:true,grade:"regional"}
    ];

    // 全局变量
    let map, routeLayers = {}, currentFilter = 'all', statusFilter = ['completed','constructing','planning'];
    let showRailway = true, showHighway = true;

    // 获取城市坐标
    function getCoords(city) {
        const c = cities[city];
        return c ? [c.lat, c.lng] : null;
    }

    // 专业配色方案 - 国家级地图标准
    function getRouteColor(route, status) {
        if (route.isHighway) {
            // 高速公路：深蓝色
            return '#1E3A8A';
        }
        // 铁路配色
        if (route.type === 'highspeed') {
            // 高铁：红色
            return status === 'completed' ? '#C41E3A' : (status === 'constructing' ? '#F59E0B' : '#999999');
        } else {
            // 普通铁路：深红色
            return status === 'completed' ? '#8B0000' : (status === 'constructing' ? '#F59E0B' : '#999999');
        }
    }

    // 线宽标准 - 国家级地图标准（1-2.5px，不超过 3px）
    function getRouteWeight(route, status) {
        const isHighspeed = route.type === 'highspeed';
        const isHighway = route.isHighway === true;
        
        if (isHighspeed) {
            // 高速铁路：已建成 2.5px，在建 2px，规划 1.5px
            if (status === 'completed') return 2.5;
            if (status === 'constructing') return 2;
            return 1.5;
        } else if (isHighway) {
            // 高速公路：已建成 2px，在建 1.5px，规划 1px
            if (status === 'completed') return 2;
            if (status === 'constructing') return 1.5;
            return 1;
        } else {
            // 普通铁路：已建成 2px，在建 1.5px，规划 1px
            if (status === 'completed') return 2;
            if (status === 'constructing') return 1.5;
            return 1;
        }
    }

    // 透明度标准
    function getRouteOpacity(status) {
        if (status === 'completed') return 0.95;
        if (status === 'constructing') return 0.85;
        return 0.7; // planning
    }

    // 线型标准（修复图例）- 国家级地图标准
    function getDashArray(status) {
        if (status === 'completed') return null; // 实线（连续）
        if (status === 'constructing') return '15, 10'; // 虚线（长虚线）
        return '5, 5'; // 点线（短点线，规划）
    }

    // 绘制双线铁路效果（高铁）
    function drawDoubleTrackRailway(latlngs, route, status) {
        if (latlngs.length < 2) return [];
        
        const color = getRouteColor(route, status);
        const weight = getRouteWeight(route, status);
        const opacity = getRouteOpacity(status);
        const dashArray = getDashArray(status);
        
        // 双线铁路：两条平行细线，间距 2px
        const lines = [];
        
        // 第一条线
        const line1 = L.polyline(latlngs, {
            color: color,
            weight: weight,
            opacity: opacity,
            dashArray: dashArray
        });
        lines.push(line1);
        
        // 第二条线（偏移模拟双线）
        // 简单实现：使用稍细的线叠加
        const line2 = L.polyline(latlngs, {
            color: color,
            weight: weight * 0.6,
            opacity: opacity * 0.8,
            dashArray: dashArray,
            offset: 2 // Leaflet 不支持原生 offset，这里仅作示意
        });
        lines.push(line2);
        
        return lines;
    }

    // 绘制单线铁路（带枕木标记效果）
    function drawSingleTrackRailway(latlngs, route, status) {
        if (latlngs.length < 2) return null;
        
        const color = getRouteColor(route, status);
        const weight = getRouteWeight(route, status);
        const opacity = getRouteOpacity(status);
        const dashArray = getDashArray(status);
        
        return L.polyline(latlngs, {
            color: color,
            weight: weight,
            opacity: opacity,
            dashArray: dashArray
        });
    }

    // 绘制高速公路（带中心黄线效果）
    function drawHighway(latlngs, route, status) {
        if (latlngs.length < 2) return null;
        
        const color = getRouteColor(route, status);
        const weight = getRouteWeight(route, status);
        const opacity = getRouteOpacity(status);
        const dashArray = getDashArray(status);
        
        return L.polyline(latlngs, {
            color: color,
            weight: weight,
            opacity: opacity,
            dashArray: dashArray
        });
    }

    // 绘制分段线路
    function drawSegmentedRoute(route, segment) {
        const latlngs = segment.cities.map(getCoords).filter(c => c !== null);
        if (latlngs.length < 2) return null;
        
        const isHighway = route.isHighway || false;
        const color = getRouteColor(route, segment.status);
        const weight = getRouteWeight(route, segment.status);
        const opacity = getRouteOpacity(segment.status);
        const dashArray = getDashArray(segment.status);
        
        const polyline = L.polyline(latlngs, {
            color, weight, opacity, dashArray
        });
        
        const segmentLabel = segment.cities.join(' - ');
        const statusLabel = segment.status === 'completed' ? '已通车' : (segment.status === 'constructing' ? '在建' : '规划');
        
        const popupContent = `
            <div style="max-width:350px;">
                <h3 style="margin:0 0 10px 0;color:${color};">${route.name}${route.code?' ('+route.code+')':''}</h3>
                <p><strong>区段:</strong> ${segmentLabel}</p>
                <p><strong>状态:</strong> ${statusLabel}</p>
                <p><strong>类型:</strong> ${isHighway ? '高速公路' : (route.type==='highspeed'?'高速铁路':'普通铁路')}</p>
            </div>
        `;
        polyline.bindPopup(popupContent);
        polyline.bindTooltip(`${route.name} (${segmentLabel})`, {
            permanent: false,
            direction: 'top'
        });
        
        return polyline;
    }

    // 绘制完整线路（非分段）
    function drawCompleteRoute(route) {
        const latlngs = route.cities.map(getCoords).filter(c => c !== null);
        if (latlngs.length < 2) return null;
        
        const isHighway = route.isHighway || false;
        const status = route.status;
        const color = getRouteColor(route, status);
        const weight = getRouteWeight(route, status);
        const opacity = getRouteOpacity(status);
        const dashArray = getDashArray(status);
        
        let polyline;
        if (isHighway) {
            // 高速公路
            polyline = drawHighway(latlngs, route, status);
        } else if (route.type === 'highspeed') {
            // 高速铁路（双线）
            const lines = drawDoubleTrackRailway(latlngs, route, status);
            return lines; // 返回数组
        } else {
            // 普通铁路（单线）
            polyline = drawSingleTrackRailway(latlngs, route, status);
        }
        
        const timeLabel = status === 'completed' && route.year ? '通车时间' : '预计通车';
        const timeValue = route.year || route.endYear || '待确认';
        const typeText = isHighway ? '高速公路' : 
                        (route.type === 'highspeed' ? '高速铁路' : '普通铁路');
        const gradeText = route.grade === 'national' ? '国家干线' : '区域干线';
        
        const popupContent = `
            <div style="max-width:350px;">
                <h3 style="margin:0 0 10px 0;color:${color};">${route.name}${route.code?' ('+route.code+')':''}</h3>
                <p><strong>类型:</strong> ${typeText}</p>
                <p><strong>等级:</strong> ${gradeText}</p>
                <p><strong>起点→终点:</strong> ${route.start} → ${route.end}</p>
                <p><strong>总里程:</strong> ${route.mileage} km</p>
                ${isHighway ? `<p><strong>车道数:</strong> ${route.lanes}</p>` : `<p><strong>设计时速:</strong> ${route.speed||'250-350'} km/h</p>`}
                <p><strong>开建时间:</strong> ${route.startYear||route.year||'待确认'}</p>
                <p><strong>${timeLabel}:</strong> ${timeValue}</p>
                <p><strong>途经城市:</strong> ${route.cities.join(' → ')}</p>
                <p><strong>战略意义:</strong> ${route.significance}</p>
            </div>
        `;
        
        if (polyline) {
            polyline.bindPopup(popupContent);
            polyline.bindTooltip(route.name, {
                permanent: false,
                direction: 'top'
            });
        }
        
        return polyline;
    }

    // 绘制线路（支持分段）
    function drawRoute(route) {
        const layers = [];
        const segmentInfo = segmentedRoutes[route.id];
        
        if (segmentInfo && segmentInfo.segments) {
            // 分段绘制
            segmentInfo.segments.forEach((segment, idx) => {
                if (!statusFilter.includes(segment.status)) return;
                const layer = drawSegmentedRoute(route, segment);
                if (layer) layers.push(layer);
            });
        } else {
            // 完整绘制
            if (!statusFilter.includes(route.status)) return [];
            const layerOrLayers = drawCompleteRoute(route);
            if (Array.isArray(layerOrLayers)) {
                layers.push(...layerOrLayers);
            } else if (layerOrLayers) {
                layers.push(layerOrLayers);
            }
        }
        
        return layers;
    }

    // 绘制所有线路
    function drawAllRoutes() {
        Object.values(routeLayers).forEach(l => l.remove());
        routeLayers = {};
        
        let count = 0, completed = 0, mileage = 0;
        
        // 处理铁路
        if (showRailway) {
            const allRailways = [...railwayData.vertical,...railwayData.horizontal,...railwayData.xinjiang,...railwayData.chuanyu];
            allRailways.forEach(route => {
                const segmentInfo = segmentedRoutes[route.id];
                let shouldDraw = false;
                
                if (segmentInfo && segmentInfo.segments) {
                    shouldDraw = segmentInfo.segments.some(s => statusFilter.includes(s.status));
                    if (currentFilter !== 'all' && !route.id.startsWith(currentFilter[0].toLowerCase())) shouldDraw = false;
                } else {
                    shouldDraw = statusFilter.includes(route.status);
                    if (currentFilter !== 'all' && !route.id.startsWith(currentFilter[0].toLowerCase())) shouldDraw = false;
                }
                
                if (!shouldDraw) return;
                
                const layers = drawRoute(route);
                layers.forEach((layer, idx) => {
                    const layerId = route.id + (layers.length > 1 ? '_s' + idx : '');
                    routeLayers[layerId] = layer;
                    layer.addTo(map);
                });
                
                count += layers.length;
                if (route.status === 'completed') completed++;
                mileage += route.mileage;
            });
        }
        
        // 处理高速公路
        if (showHighway) {
            highwayData.forEach(route => {
                if (!statusFilter.includes(route.status)) return;
                if (currentFilter !== 'all' && currentFilter !== 'highway') return;
                
                const layers = drawRoute(route);
                layers.forEach((layer, idx) => {
                    const layerId = route.id + (layers.length > 1 ? '_s' + idx : '');
                    routeLayers[layerId] = layer;
                    layer.addTo(map);
                });
                
                count += layers.length;
                if (route.status === 'completed') completed++;
                mileage += route.mileage;
            });
        }
        
        document.getElementById('routeCount').textContent = count;
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('totalMileage').textContent = mileage.toLocaleString();
    }

    // 筛选线路
    function filterRoutes(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.filter-btn.${type}`).classList.add('active');
        drawAllRoutes();
    }

    // 切换交通类型显示
    function toggleTransportType() {
        showRailway = document.getElementById('showRailway').checked;
        showHighway = document.getElementById('showHighway').checked;
        drawAllRoutes();
    }

    // 切换状态筛选
    function toggleStatus(status) {
        const idx = statusFilter.indexOf(status);
        if (idx >= 0) statusFilter.splice(idx, 1);
        else statusFilter.push(status);
        
        document.querySelectorAll('.status-btn').forEach(b => {
            const btnStatus = b.classList.contains('completed')?'completed':b.classList.contains('constructing')?'constructing':'planning';
            b.classList.toggle('active', statusFilter.includes(btnStatus));
        });
        drawAllRoutes();
    }

    // 初始化
    window.onload = function() {
        map = L.map('map').setView([35.8617, 104.1954], 4);
        
        // CartoDB Light 底图 - 专业地图底图
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap ©CARTO',
            maxZoom: 18,
            subdomains: 'abcd'
        }).addTo(map);
        
        drawAllRoutes();
        document.getElementById('loadingOverlay').style.display = 'none';
        
        console.log('✅ 地图加载完成 - v10 国家级标准版');
        console.log('🎨 配色：高铁红色#C41E3A / 普铁深红#8B0000 / 高速深蓝#1E3A8A / 在建橙色#F59E0B / 规划灰色#999999');
        console.log('📏 线宽：高铁 2.5/2/1.5px | 普铁 2/1.5/1px | 高速 2/1.5/1px（已建成/在建/规划）');
        console.log('📖 线型：实线=已建成 | 虚线 (15,10)=在建 | 点线 (5,5)=规划');
        console.log('🛤️ 铁路效果：高铁双线 | 普铁单线');
        console.log('🗺️ 线路走向：添加 G219/G318 等真实走向中间点');
    };
    </script>
